<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MeinMagenta</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MeinMagenta" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FCFDFE" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <link rel="icon" href="/icon.png" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── TeleNeoWeb via Telekom Scale CDN ── */
    @font-face {
      font-family: 'TeleNeoWeb'; font-weight: 400; font-style: normal; font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@telekom/scale-components/dist/scale-components/fonts/TeleNeoWeb/TeleNeoWeb-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'TeleNeoWeb'; font-weight: 500; font-style: normal; font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@telekom/scale-components/dist/scale-components/fonts/TeleNeoWeb/TeleNeoWeb-Medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'TeleNeoWeb'; font-weight: 700; font-style: normal; font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@telekom/scale-components/dist/scale-components/fonts/TeleNeoWeb/TeleNeoWeb-Bold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'TeleNeoWeb'; font-weight: 800; font-style: normal; font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@telekom/scale-components/dist/scale-components/fonts/TeleNeoWeb/TeleNeoWeb-ExtraBold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'TeleNeoWeb'; font-weight: 900; font-style: normal; font-display: swap;
      src: url('https://cdn.jsdelivr.net/npm/@telekom/scale-components/dist/scale-components/fonts/TeleNeoWeb/TeleNeoWeb-Ultra.woff2') format('woff2');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'TeleNeoWeb', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    #root {
      width: 390px;
      height: 844px;
      position: relative;
      overflow: hidden;
      background: #FCFDFE;
      border-radius: 50px;
      box-shadow:
        0 0 0 10px #1c1c1e,
        0 0 0 12px #3a3a3c,
        0 40px 80px rgba(0,0,0,0.7);
    }

    @media (max-width: 430px) {
      body { background: #FCFDFE; display: block; min-height: 100dvh; }
      #root { width: 100%; height: 100dvh; border-radius: 0; box-shadow: none; }
    }

    @supports (padding-top: env(safe-area-inset-top)) {
      @media (max-width: 430px) {
        #root { padding-top: env(safe-area-inset-top); }
      }
    }

    .scroll-area { overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.45; } }

    .slide-up    { animation: slideUp 0.34s cubic-bezier(0.32,0.72,0,1); }
    .slide-right { animation: slideInRight 0.28s cubic-bezier(0.32,0.72,0,1); }
    .fade-in     { animation: fadeIn 0.18s ease; }

    * { -webkit-tap-highlight-color: transparent; }
    button { border: none; background: none; cursor: pointer; padding: 0; }

    input { font-family: inherit; }

    /* Ensure TeleNeoWeb cascades everywhere */
    #root { font-family: 'TeleNeoWeb', -apple-system, 'Helvetica Neue', Arial, sans-serif; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

/* ─── Design Tokens ───────────────────────────────────────── */
const T = {
  accent:        '#E20074',
  accentDark:    '#B8005E',
  text:          '#000000',
  textSub:       '#616161',
  textLink:      '#E20074',
  bg:            '#FCFDFE',
  bgSubtle:      '#F1F1F1',
  bgCard:        '#4AD9CD',
  stroke:        '#E0E0E0',
  red:           '#FF1000',
  success:       '#007845',
  warning:       '#D05500',
  destructive:   '#C20D00',
  white:         '#FFFFFF',
  black:         '#000000',
};

/* ─── Mock Notifications ──────────────────────────────────── */
const NOTIFS = [
  { id:'1', type:'invoice',  headline:'Your internet bill went up €4.20',
    summary:'Your 6-month discount ended on 1 June.',
    service:'MagentaZuhause · Internet', date:'08 Jun',
    status:'actionRequired', isRead:false, hasDocument:true },
  { id:'2', type:'contract', headline:'Your mobile contract was updated.',
    summary:'No changes to your costs.',
    service:'Magenta XL · Mobile', date:'06 Jun',
    status:'noActionNeeded', isRead:true, hasDocument:true },
  { id:'3', type:'order',    headline:'Your fibre order is confirmed.',
    summary:'Installation scheduled for 15 Jun.',
    service:'MagentaZuhause · Internet', date:'05 Jun',
    status:'noActionNeeded', isRead:false, hasDocument:false },
  { id:'4', type:'account',  headline:'Confirm your new bank details by 15 Jun.',
    summary:'',
    service:'Account', date:'04 Jun',
    status:'actionRequired', isRead:false, hasDocument:false },

/* ─── SVG Icons (ODS-matched) ─────────────────────────────── */
const Ic = {
  /* Bottom nav – Overview: filled house */
  Home: ({ active }) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      {active
        ? <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V10.5Z" fill={T.accent}/>
        : <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V10.5Z" stroke={T.textSub} strokeWidth="1.6" fill="none"/>
      }
      <path d="M9 22V13h6v9" stroke={active ? T.white : T.textSub} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>
  ),
  /* Moments: heart */
  Heart: ({ active }) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">

        stroke={active ? T.accent : T.textSub} strokeWidth="1.6"
        fill={active ? T.accent+'25' : 'none'}/>
    </svg>
  ),
  /* Magenta AI: dotted/sparkle circle */

  ),
  /* Support: circle with ? */
  Support: ({ active }) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke={active ? T.accent : T.textSub} strokeWidth="1.6"/>
      <path d="M9.5 9.5a2.5 2.5 0 0 1 4.9.8c0 1.7-2.4 2.2-2.4 4" stroke={active ? T.accent : T.textSub} strokeWidth="1.6" strokeLinecap="round"/>
      <circle cx="12" cy="17" r="0.8" fill={active ? T.accent : T.textSub}/>
    </svg>
  ),
  Bell: ({ size=20, color=T.textSub }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke={color} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke={color} strokeWidth="1.7" strokeLinecap="round"/>
    </svg>
  ),
  Settings: () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3" stroke={T.textSub} strokeWidth="1.7"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke={T.textSub} strokeWidth="1.7"/>

  Grid: () => (

      <rect x="3" y="3" width="7" height="7" rx="1.5" stroke={T.textSub} strokeWidth="1.7"/>
      <rect x="14" y="3" width="7" height="7" rx="1.5" stroke={T.textSub} strokeWidth="1.7"/>
      <rect x="14" y="14" width="7" height="7" rx="1.5" stroke={T.textSub} strokeWidth="1.7"/>

    </svg>

  Package: () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <polyline points="21 8 21 16 12 21 3 16 3 8 12 3 21 8" stroke={T.textSub} strokeWidth="1.7" strokeLinejoin="round"/>
      <polyline points="3.27 6.96 12 12 20.73 6.96" stroke={T.textSub} strokeWidth="1.7"/>
      <line x1="12" y1="22" x2="12" y2="12" stroke={T.textSub} strokeWidth="1.7"/>
    </svg>
  ),
  LogOut: () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke={T.destructive} strokeWidth="1.7" strokeLinecap="round"/>
      <polyline points="16 17 21 12 16 7" stroke={T.destructive} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/>
      <line x1="21" y1="12" x2="9" y2="12" stroke={T.destructive} strokeWidth="1.7" strokeLinecap="round"/>
    </svg>
  ),
  ChevronRight: ({ color=T.stroke }) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M9 18l6-6-6-6" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  ChevronDown: () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M6 9l6 6 6-6" stroke={T.textSub} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  Back: () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M15 18l-6-6 6-6" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  Search: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <circle cx="11" cy="11" r="8" stroke={T.textSub} strokeWidth="1.7"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65" stroke={T.textSub} strokeWidth="1.7" strokeLinecap="round"/>
    </svg>
  ),
  X: ({ color=T.textSub }) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <line x1="18" y1="6" x2="6" y2="18" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      <line x1="6" y1="6" x2="18" y2="18" stroke={color} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  ),
  Doc: () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke={T.textSub} strokeWidth="1.7"/>
      <polyline points="14 2 14 8 20 8" stroke={T.textSub} strokeWidth="1.7"/>

  ),
  Check: () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
      <polyline points="20 6 9 17 4 12" stroke={T.white} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

  ),
  Arrow: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M5 12h14M12 5l7 7-7 7" stroke={T.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>

  ),
  ThumbUp: ({ filled }) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill={filled ? T.success : 'none'}>
      <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z" stroke={filled ? T.success : T.textSub} strokeWidth="1.7"/>
      <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" stroke={filled ? T.success : T.textSub} strokeWidth="1.7"/>
    </svg>
  ),
  ThumbDown: ({ filled }) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill={filled ? T.destructive : 'none'}>
      <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z" stroke={filled ? T.destructive : T.textSub} strokeWidth="1.7"/>
      <path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17" stroke={filled ? T.destructive : T.textSub} strokeWidth="1.7"/>

};

/* ─── Status Bar ──────────────────────────────────────────── */
function StatusBar() {

    <div style={{ height:50, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 28px 0 24px', flexShrink:0 }}>
      <span style={{ fontSize:15, fontWeight:600, letterSpacing:0.2 }}>9:41</span>
      <div style={{ display:'flex', gap:7, alignItems:'center' }}>
        {/* Signal bars */}
        <svg width="17" height="12" viewBox="0 0 17 12" fill={T.text}>
          <rect x="0" y="7" width="3" height="5" rx="0.5"/>
          <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.5"/>
          <rect x="9" y="2" width="3" height="10" rx="0.5"/>
          <rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.28"/>
        </svg>
        {/* WiFi */}
        <svg width="16" height="12" viewBox="0 0 16 12" fill={T.text}>
          <path d="M8 9.5C8.9 9.5 9.6 10.2 9.6 11.1C9.6 12 8.9 12.7 8 12.7C7.1 12.7 6.4 12 6.4 11.1C6.4 10.2 7.1 9.5 8 9.5Z" transform="scale(1,0.9)"/>
          <path d="M8 6.5C9.8 6.5 11.3 7.3 12.3 8.6L13.5 7.3C12.1 5.6 10.2 4.5 8 4.5C5.8 4.5 3.9 5.6 2.5 7.3L3.7 8.6C4.7 7.3 6.2 6.5 8 6.5Z"/>
          <path d="M8 3.5C11 3.5 13.6 4.9 15.2 7.1L16 6.1C14.1 3.6 11.2 2 8 2C4.8 2 1.9 3.6 0 6.1L0.8 7.1C2.4 4.9 5 3.5 8 3.5Z" opacity="0.4"/>
        </svg>
        {/* Battery */}
        <div style={{ display:'flex', alignItems:'center', gap:1 }}>
          <div style={{ width:24, height:12, border:`1.5px solid ${T.text}`, borderRadius:3.5, padding:'1.5px', position:'relative' }}>
            <div style={{ width:'78%', height:'100%', background:T.text, borderRadius:1.5 }}/>
          </div>
          <div style={{ width:2, height:6, background:T.text, borderRadius:'0 1px 1px 0', opacity:0.4 }}/>

}

/* ─── T Logo (ODS-accurate: flat magenta T) ───────────────── */
function TLogo() {
  return (
    <div style={{ width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <svg width="28" height="34" viewBox="0 0 28 34" fill="none">
        <rect x="0" y="0" width="28" height="6" rx="0" fill={T.accent}/>
        <rect x="11" y="0" width="6" height="34" rx="0" fill={T.accent}/>
      </svg>
    </div>
  );
}

/* ─── ODS Bottom Navigation ───────────────────────────────── */
function ODSBottomNav({ active='overview' }) {
  const tabs = [
    { id:'overview', label:'Overview',   Icon:Ic.Home    },
    { id:'moments',  label:'Moments',    Icon:Ic.Heart   },
    { id:'ai',       label:'Magenta AI', Icon:Ic.AI      },
    { id:'support',  label:'Support',    Icon:Ic.Support },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      background:T.white,
      borderTop:`1px solid ${T.stroke}`,
      display:'flex', height:83, paddingBottom:22,
      zIndex:5,
    }}>
      {tabs.map(({ id, label, Icon }) => {
        const on = active === id;
        return (
          <div key={id} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center',
            justifyContent:'center', gap:3, cursor:'pointer', minHeight:48,
            color: on ? T.accent : T.textSub,
          }}>
            <Icon active={on} />
            <span style={{ fontSize:10, fontWeight: on ? 700 : 500, lineHeight:1, letterSpacing:0.1 }}>
              {label}
            </span>
          </div>
        );
      })}
    </div>
  );
}

/* ─── ODS Badge Number ────────────────────────────────────── */
function Badge({ n, size='md' }) {
  if (!n) return null;
  const sm = size === 'sm';
  return (
    <div style={{
      background:T.red, color:T.white, borderRadius:999,
      minWidth: sm ? 16 : 20, height: sm ? 16 : 20,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize: sm ? 10 : 11, fontWeight:700, padding:'0 4px', lineHeight:1,
      border:`2px solid ${T.white}`,
    }}>{n}</div>
  );
}

/* ─── ODS Tag / Chip ──────────────────────────────────────── */
function Chip({ label, variant='default', sm }) {
  const map = {
    actionRequired: { bg:T.accent+'18', color:T.accent,    border:`1px solid ${T.accent}50` },
    noActionNeeded: { bg:T.bgSubtle,    color:T.textSub,   border:`1px solid ${T.stroke}` },
    service:        { bg:T.bgSubtle,    color:T.textSub,   border:`1px solid ${T.stroke}` },
    success:        { bg:T.success+'18',color:T.success,   border:`1px solid ${T.success}50` },
    default:        { bg:T.bgSubtle,    color:T.textSub,   border:`1px solid ${T.stroke}` },
  };
  const s = map[variant] || map.default;
  return (
    <span style={{
      ...s, borderRadius:999,
      padding: sm ? '2px 8px' : '3px 10px',
      fontSize: sm ? 11 : 12, fontWeight:600, lineHeight:'16px',
      whiteSpace:'nowrap', display:'inline-flex', alignItems:'center', gap:4,
    }}>{label}</span>
  );
}

/* ─── ODS Button ──────────────────────────────────────────── */
function Btn({ label, variant='primary', sm, full, onClick }) {
  const [press, setPress] = useState(false);
  const pri = variant === 'primary';
  return (
    <button
      onMouseDown={()=>setPress(true)} onMouseUp={()=>setPress(false)}
      onTouchStart={()=>setPress(true)} onTouchEnd={()=>setPress(false)}
      onClick={onClick}
      style={{
        background: press ? (pri ? T.accentDark : T.bgSubtle) : (pri ? T.accent : T.white),
        color: pri ? T.white : T.accent,
        border: pri ? 'none' : `1.5px solid ${T.accent}`,
        borderRadius:999, cursor:'pointer',
        padding: sm ? '8px 18px' : '12px 28px',
        fontSize: sm ? 14 : 16, fontWeight:655, lineHeight:'20px',
        minHeight: sm ? 36 : 48,
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        width: full ? '100%' : 'auto',
        transition:'background 0.12s',
      }}>{label}</button>
  );
}

/* ─── Data usage bar (ODS card detail) ───────────────────── */
function DataBar({ pct=0.72, used='4.2', total='20' }) {
  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6 }}>
        <p style={{ fontSize:14, fontWeight:500, color:T.text }}>
          <strong style={{ fontWeight:700 }}>{used} GB</strong> left
        </p>
        <p style={{ fontSize:11, color:'rgba(255,255,255,0.65)' }}>{used} / {total} GB</p>
      </div>
      <div style={{ height:5, borderRadius:999, background:'rgba(255,255,255,0.25)', overflow:'hidden' }}>
        <div style={{ width:`${pct*100}%`, height:'100%', background:T.white, borderRadius:999 }}/>
      </div>
    </div>
  );
}

/* ─── SCREEN 1: Overview ──────────────────────────────────── */
function OverviewScreen({ onAvatar, unread }) {
  const [critDismissed, setCritDismissed] = useState(false);
  const [bannerDismissed, setBannerDismissed] = useState(false);
  const [activeTab, setActiveTab] = useState('Mobile');

  return (
    <div style={{ height:'100%', background:T.bg, display:'flex', flexDirection:'column' }}>
      <StatusBar />

function NotifCenter({ onBack, onCard, notifs, onMarkAllRead }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all');
  const filters = [
    { id:'all', label:'All' },
    { id:'invoice', label:'Invoices' },
    { id:'contract', label:'Contracts' },
    { id:'actionRequired', label:'Action required' },
  ];
  const filtered = notifs.filter(n => {
    const fok = filter==='all' ? true : filter==='actionRequired' ? n.status==='actionRequired' : n.type===filter;
    const qok = !q || [n.headline,n.summary,n.service].some(s=>s.toLowerCase().includes(q.toLowerCase()));
    return fok && qok;
  });
  const newItems  = filtered.filter(n => ['08 Jun','06 Jun'].includes(n.date));
  const weekItems = filtered.filter(n => ['05 Jun','04 Jun'].includes(n.date));
  const unread = notifs.filter(n=>!n.isRead).length;

    <div className="slide-right" style={{ position:'absolute', inset:0, background:T.bg, display:'flex', flexDirection:'column', zIndex:10 }}>
      <StatusBar />
      {/* ODS Subpage Header: [flex-1 left] [title center] [flex-1 right] */}

        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <h1 style={{ fontSize:18, fontWeight:655, color:T.text, letterSpacing:0, fontVariationSettings:'"wdth" 100', lineHeight:'23px', textAlign:'center' }}>Notifications</h1>
          {unread > 0 && <Badge n={unread} />}

        <div style={{ flex:1, display:'flex', justifyContent:'flex-end' }}>
          {unread > 0 && (
            <button onClick={onMarkAllRead} style={{ padding:'6px 4px', cursor:'pointer', fontSize:12, fontWeight:600, color:T.accent, background:'none', border:'none' }}>
              Mark all read
            </button>
          )}
        </div>
      </div>

      {/* Search */}
      <div style={{ padding:'0 16px 12px', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, background:T.bgSubtle, borderRadius:12, padding:'10px 14px', border:`1px solid ${T.stroke}` }}>
          <Ic.Search />
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search notifications…"

          <button key={f.id} onClick={()=>setFilter(f.id)} style={{

                <div style={{ display:'flex', justifyContent:'space-between', padding:'10px 0', fontWeight:700 }}>
                  <span style={{ fontSize:14 }}>Total this month</span>
                  <span style={{ fontSize:16, color:T.accent }}>€58.95</span>
                </div>
              </div>
            )}
          </div>
        </div>

        <Btn label="View full PDF" full />

        {/* Was this helpful? */}
        <div style={{ background:T.white, borderRadius:16, padding:16, margin:'12px 0', border:`1px solid ${T.stroke}`, display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
          <p style={{ fontSize:14, fontWeight:700 }}>Was this explanation helpful?</p>
          <div style={{ display:'flex', gap:28 }}>
            {[
              { type:'up',   Icon:Ic.ThumbUp,   label:'Helpful',     col:T.success },
              { type:'down', Icon:Ic.ThumbDown, label:'Not helpful', col:T.destructive },
            ].map(({ type, Icon, label, col }) => (
              <button key={type} onClick={()=>setFb(type)} style={{
                display:'flex', flexDirection:'column', alignItems:'center', gap:5,
                cursor:'pointer', opacity: fb && fb!==type ? 0.35 : 1, transition:'opacity 0.2s',
              }}>
                <Icon filled={fb===type} />
                <span style={{ fontSize:11, color: fb===type ? col : T.textSub, fontWeight:600 }}>{label}</span>
              </button>
            ))}
          </div>
          {fb && (
            <p className="fade-in" style={{ fontSize:12, color:T.success, fontWeight:700, background:T.success+'12', padding:'6px 16px', borderRadius:999 }}>
              {fb==='up' ? 'Thanks for the feedback! 👍' : 'Thanks — we\'ll improve this.'}
            </p>
          )}
        </div>

        <div style={{ marginTop:4 }}>
          <Btn label="Get help" variant="secondary" full />
        </div>
      </div>
    </div>
  );
}

/* ─── Root App ────────────────────────────────────────────── */
function App() {
  const [screen, setScreen]     = useState('overview');
  const [sheet, setSheet]       = useState(false);
  const [notifs, setNotifs]     = useState(NOTIFS);
  const [selected, setSelected] = useState(null);
  const unread = notifs.filter(n=>!n.isRead).length;

  const openCard = (n) => {
    setNotifs(prev => prev.map(x => x.id===n.id ? {...x, isRead:true} : x));
    setSelected(n);
    setScreen('detail');
  };

  return (
    <div style={{ width:390, height:844, position:'relative', background:T.bg, overflow:'hidden', borderRadius:'inherit' }}>
      <OverviewScreen onAvatar={()=>setSheet(true)} unread={unread} />

      {(screen==='center'||screen==='detail') && (
        <NotifCenter
          onBack={()=>setScreen('overview')}
          onCard={openCard}
          notifs={notifs}
          onMarkAllRead={()=>setNotifs(prev=>prev.map(n=>({...n, isRead:true})))}
        />
      )}

      {screen==='detail' && selected && (
        <InvoiceDetail onBack={()=>setScreen('center')} />
      )}

      {sheet && screen==='overview' && (
        <ProfileSheet
          onClose={()=>setSheet(false)}
          onNotifs={()=>{ setSheet(false); setScreen('center'); }}
          unread={unread}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
