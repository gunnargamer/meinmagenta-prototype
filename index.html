<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0" />
  <title>MeinMagenta OneApp — Notification Center</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    #root {
      width: 390px;
      height: 844px;
      position: relative;
      overflow: hidden;
      background: #FCFDFE;
      border-radius: 48px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
    }

    /* Scrollable areas */
    .scroll-area {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* Animations */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .slide-up    { animation: slideUp 0.32s cubic-bezier(0.32, 0.72, 0, 1); }
    .slide-right { animation: slideInRight 0.28s cubic-bezier(0.32, 0.72, 0, 1); }
    .fade-in     { animation: fadeIn 0.2s ease; }

    /* Tap highlight suppression */
    * { -webkit-tap-highlight-color: transparent; }

    button { border: none; background: none; cursor: pointer; padding: 0; }
  </style>
</head>

/* ─── ODS Badge Number ───────────────────────────────────────── */
function ODSBadgeNumber({ count, size = 'default' }) {
  if (!count) return null;
  const small = size === 'small';
  return (
    <div style={{
      background: T.red,
      color: T.white,
      borderRadius: 999,
      minWidth: small ? 16 : 20,
      height: small ? 16 : 20,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: small ? 10 : 11,
      fontWeight: 700,
      padding: '0 4px',
      lineHeight: 1,
      border: `2px solid ${T.white}`,
    }}>
      {count}
    </div>
  );
}

/* ─── ODS Tag Static ─────────────────────────────────────────── */
function ODSTagStatic({ label, variant = 'default', size = 'default' }) {
  const styles = {
    actionRequired: { bg: T.accent + '15', color: T.accent, border: `1px solid ${T.accent}40` },
    noActionNeeded: { bg: T.bgSubtle,       color: T.textRecessive, border: `1px solid ${T.stroke}` },
    service:        { bg: T.bgSubtle,       color: T.textRecessive, border: `1px solid ${T.stroke}` },
    success:        { bg: T.success + '15', color: T.success, border: `1px solid ${T.success}40` },
    default:        { bg: T.bgSubtle,       color: T.textRecessive, border: `1px solid ${T.stroke}` },
  };
  const s = styles[variant] || styles.default;
  return (
    <span style={{
      background: s.bg, color: s.color, border: s.border,
      borderRadius: 999, padding: size === 'small' ? '2px 8px' : '3px 10px',
      fontSize: size === 'small' ? 11 : 12, fontWeight: 600, lineHeight: '15.6px',
      whiteSpace: 'nowrap', display: 'inline-flex', alignItems: 'center', gap: 4,
    }}>
      {label}
    </span>
  );
}

/* ─── ODS Button ─────────────────────────────────────────────── */
function ODSButton({ label, variant = 'primary', size = 'default', onClick, fullWidth }) {
  const [pressed, setPressed] = useState(false);
  const isPrimary = variant === 'primary';
  const isSmall = size === 'small';
  return (
    <button
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      onClick={onClick}
      style={{
        background: pressed
          ? (isPrimary ? '#B8005E' : T.bgSubtle)
          : (isPrimary ? T.accent : T.white),
        color: isPrimary ? T.white : T.accent,
        border: isPrimary ? 'none' : `1.5px solid ${T.accent}`,
        borderRadius: 999, cursor: 'pointer',
        padding: isSmall ? '8px 16px' : '12px 24px',
        fontSize: isSmall ? 14 : 16,
        fontWeight: 655, lineHeight: '20px',
        minHeight: 48, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        width: fullWidth ? '100%' : 'auto',
        transition: 'background 0.1s',
        gap: 6,
      }}>
      {label}
    </button>
  );
}

/* ─── ODS Avatar ─────────────────────────────────────────────── */
function ODSAvatar({ size = 40, initials = 'JM', color = T.accent }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: color, color: T.white,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.35, fontWeight: 700, flexShrink: 0,
    }}>
      {initials}
    </div>
  );
}

/* ─── ODS Bottom Navigation ──────────────────────────────────── */
function ODSBottomNav({ active = 'overview' }) {
  const tabs = [
    { id: 'overview', label: 'Overview',   Icon: ({ a }) => <Icon.Home active={a} /> },
    { id: 'moments',  label: 'Moments',    Icon: ({ a }) => <Icon.Star active={a} /> },
    { id: 'ai',       label: 'Magenta AI', Icon: ({ a }) => <Icon.AI active={a} /> },
    { id: 'support',  label: 'Support',    Icon: ({ a }) => <Icon.Support active={a} /> },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: T.white, borderTop: `1px solid ${T.stroke}20`,
      display: 'flex', height: 83, paddingBottom: 20,
      boxShadow: '0 -2px 12px rgba(0,0,0,0.06)',
    }}>
      {tabs.map(({ id, label, Icon: TabIcon }) => {
        const isActive = active === id;
        return (
          <div key={id} style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 3,
            color: isActive ? T.accent : T.textRecessive,
            cursor: 'pointer', minHeight: 48,
          }}>
            <TabIcon a={isActive} />
            <span style={{ fontSize: 10, fontWeight: isActive ? 655 : 500, lineHeight: 1 }}>
              {label}
            </span>
          </div>
        );
      })}
    </div>
  );
}

function ODSToast({ message, visible }) {
  if (!visible) return null;
  return (
    <div className="fade-in" style={{
      position: 'absolute', bottom: 100, left: '50%', transform: 'translateX(-50%)',
      background: '#1a1a2e', color: T.white, padding: '10px 20px',
      borderRadius: 999, fontSize: 14, fontWeight: 500,
      zIndex: 100, whiteSpace: 'nowrap',
      boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
    }}>
      {message}
    </div>
  );
}

/* ─── Root App ───────────────────────────────────────────────── */
function App() {
  const [screen, setScreen]           = useState('overview');   // 'overview' | 'center' | 'detail'
  const [showProfile, setShowProfile] = useState(false);
  const [notifications, setNotifications] = useState(NOTIFICATIONS_DATA);
  const [selectedNotif, setSelectedNotif] = useState(null);
  const [toast, setToast]             = useState({ visible: false, message: '' });

  const unreadCount = notifications.filter(n => !n.isRead).length;

  const showToast = (msg) => {
    setToast({ visible: true, message: msg });
    setTimeout(() => setToast({ visible: false, message: '' }), 2200);
  };

  const handleCardTap = (notif) => {
    setSelectedNotif(notif);
    // Mark as read
    setNotifications(prev =>
      prev.map(n => n.id === notif.id ? { ...n, isRead: true } : n)
    );
    setScreen('detail');
  };

  const handleMarkRead = (id) => {
    setNotifications(prev =>
      prev.map(n => n.id === id ? { ...n, isRead: true } : n)
    );
    showToast('Marked as read');
  };

  return (
    <div style={{ width: 390, height: 844, position: 'relative', background: T.bg, overflow: 'hidden', borderRadius: 48 }}>

      {/* Overview always rendered underneath */}
      <OverviewScreen
        onAvatarTap={() => setShowProfile(true)}
        notifCount={unreadCount}
      />

      {/* Notification Center */}
      {(screen === 'center' || screen === 'detail') && (
        <NotificationCenterScreen
          key="center"
          onBack={() => { setScreen('overview'); setShowProfile(false); }}
          onCardTap={handleCardTap}
          notifications={notifications}
          onMarkRead={handleMarkRead}
        />
      )}

      {/* Invoice Detail */}
      {screen === 'detail' && selectedNotif && (
        <InvoiceDetailScreen
          notif={selectedNotif}
          onBack={() => setScreen('center')}
        />
      )}

      {/* Profile Bottom Sheet */}
      {showProfile && screen === 'overview' && (
        <ODSProfileBottomSheet
          onClose={() => setShowProfile(false)}
          onNotifications={() => {
            setShowProfile(false);
            setScreen('center');
          }}
          notifCount={unreadCount}
        />
      )}

      {/* Toast */}
      <ODSToast message={toast.message} visible={toast.visible} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
